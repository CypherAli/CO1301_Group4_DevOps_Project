name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ] # 1. Mở khóa trigger cho nhánh dev
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Gỡ bỏ services postgres vì chúng ta sử dụng Mock trong bộ test, 
    # việc này giúp CI chạy nhanh hơn và tránh lỗi kết nối không đáng có.

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Run backend tests
        env:
          NODE_ENV: test
        run: |
          cd backend
          npm test

  deploy-backend:
    name: Deploy Backend to Render
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Backend Deploy (Render)
        # 1. Chỉ chạy khi có secret, không gây lỗi workflow
        if: env.RENDER_DEPLOY_HOOK_BACKEND != ''
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}
        env:
          RENDER_DEPLOY_HOOK_BACKEND: ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}

      - name: Trigger Frontend Deploy (Render)
        if: env.RENDER_DEPLOY_HOOK_FRONTEND != ''
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
        env:
          RENDER_DEPLOY_HOOK_FRONTEND: ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}